{% extends "base1.html" %}
{% block title %}
    Signup
{% endblock %}
{% block content%}
    <div class="flex justify-center items-center min-h-[70vh]">

        <form method="POST" class="bg-gray-800 p-8 rounded-xl shadow-lg w-full max-w-md space-y-6">

            <h2 class="text-2xl font-bold text-center text-indigo-400">
                Signup
            </h2>

            <!-- Username -->
            <div>
                <label class="block text-sm mb-1 text-gray-400">Username</label>
                <input type="text" name="name" required
                    class="w-full px-4 py-2 rounded bg-gray-900 border border-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <div>
                <label class="block text-sm mb-1 text-gray-400">Email</label>
                <input type="email" name="email" required
                    class="w-full px-4 py-2 rounded bg-gray-900 border border-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm mb-1 text-gray-400">Password</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-2 rounded bg-gray-900 border border-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <!-- Button -->
            <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-500 transition py-2 rounded font-semibold">
                Sign Up
            </button>

        </form>

    </div>
{% endblock%}
