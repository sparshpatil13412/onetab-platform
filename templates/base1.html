<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{% block title %}OneTab{% endblock %}</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 text-gray-100 font-sans flex flex-col min-h-screen">

    <!-- 🔝 Navbar -->
    <nav class="bg-gray-800/80 backdrop-blur border-b border-gray-700 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex items-center justify-between py-4 px-6">

            <!-- Brand -->
            <a href="/" class="flex items-center gap-2 font-bold text-xl text-indigo-400 hover:text-indigo-300 transition">
                OneTab
            </a>

            <!-- Right side -->
            <div class="flex items-center gap-4">

                <a href="/home" class="hover:text-indigo-300 px-3 py-1 rounded transition">
                    Home
                </a>

                <a href="{{url_for('about')}}" class="hover:text-indigo-300 px-3 py-1 rounded transition">
                    About
                </a>

                <!-- Dropdown -->
                <div class="relative">
                    <button onclick="toggleDropdown()" 
                        class="flex items-center gap-1 bg-gray-700 px-3 py-1 rounded hover:bg-gray-600 transition">
                        Select
                        <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" 
                                d="M5.23 7.21a.75.75 0 011.06.02L10 10.94l3.71-3.71a.75.75 0 111.06 1.06l-4.24 4.25a.75.75 0 01-1.06 0L5.21 8.27a.75.75 0 01.02-1.06z" 
                                clip-rule="evenodd" />
                        </svg>
                    </button>

                    <div id="dropdownMenu" 
                         class="hidden absolute right-0 mt-2 w-44 bg-gray-800 rounded-md shadow-lg border border-gray-700 overflow-hidden">

                        <a href="{{url_for('login')}}" class="block px-4 py-2 hover:bg-gray-700 transition">Login</a>
                        <a href="{{url_for('signup')}}" class="block px-4 py-2 hover:bg-gray-700 transition">Signup</a>

                        <div class="border-t border-gray-700"></div>
                    </div>
                </div>

            </div>
        </div>
    </nav>

    <!-- 📢 Flash Messages -->
    <div class="max-w-4xl mx-auto mt-4 px-6">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="bg-green-600/20 text-green-400 px-4 py-2 rounded mb-2">
                        {{ msg }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <!-- 📦 Content -->
    <main class="flex-grow max-w-7xl mx-auto w-full py-8 px-6">
        {% block content %}{% endblock %}
    </main>

    <!-- 🔻 Footer -->
    <footer class="bg-gray-800 border-t border-gray-700 text-center py-4 text-sm text-gray-400">
        © 2026 OneTab. Built with Flask
    </footer>

    <!-- JS -->
    <script>
        function toggleDropdown() {
            document.getElementById("dropdownMenu").classList.toggle("hidden");
        }

        // close when clicking outside (pro touch 😏)
        window.onclick = function(e) {
            if (!e.target.closest('#dropdownMenu') && !e.target.closest('button')) {
                document.getElementById("dropdownMenu").classList.add("hidden");
            }
        }
    </script>

</body>
</html>
