{% extends "base2.html" %}

{% block content %}

<div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-semibold">{{ folder.name }}</h2>

    <button onclick="openModal()" 
        class="bg-indigo-600 px-4 py-2 rounded">
        + Upload
    </button>
</div>

{% if files %}
<div class="space-y-3">

    {% for file in files %}
    <div class="bg-gray-800 p-4 rounded flex justify-between items-center">

        <div>📄 {{ file.filename }}</div>

        <div class="flex gap-3">
            <a href="/uploads/user_{{session['user_id']}}/folder_{{folder.uuid}}/{{file.filename}}" 
               target="_blank"
               class="text-blue-400">View</a>

            <a href="/delete_file/{{file.id}}" 
               class="text-red-400">Delete</a>
        </div>

    </div>
    {% endfor %}

</div>

{% else %}
<div class="text-center text-gray-400 mt-10">
    <p>No files in this folder</p>
</div>
{% endif %}

<!-- Upload Modal -->
<div id="uploadModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">

    <div class="bg-gray-800 p-6 rounded-lg w-96">

        <h3 class="text-lg mb-4">Upload File</h3>

        <form action="/upload/{{folder.uuid}}" method="POST" enctype="multipart/form-data">
            <input type="file" name="file" class="mb-4">

            <div class="flex justify-end gap-2">
                <button type="button" onclick="closeModal()" class="px-3 py-1 bg-gray-600 rounded">Cancel</button>
                <button class="px-3 py-1 bg-indigo-600 rounded">Upload</button>
            </div>
        </form>

    </div>
</div>

<script>
function openModal() {
    document.getElementById("uploadModal").classList.remove("hidden");
}

function closeModal() {
    document.getElementById("uploadModal").classList.add("hidden");
}
</script>

{% endblock %}
