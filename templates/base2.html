<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{% block title %}{% endblock %}</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

</head>

<body class="bg-gray-900 text-gray-100 font-sans flex flex-col min-h-screen">

    <!-- 🔝 Navbar -->
    <nav class="bg-gray-800/80 backdrop-blur border-b border-gray-700 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex items-center justify-between py-4 px-6">

            <!-- Brand -->
            <a href="/" class="flex items-center gap-2 font-bold text-xl text-indigo-400 hover:text-indigo-300 transition">
                OneTab
            </a>

            <!-- Right side -->
            <div class="flex items-center gap-4">

                <a href="/dashboard" class="hover:text-indigo-300 px-3 py-1 rounded transition">
                    Dashboard
                </a>

                <a href="/dashboard" 
                   class="bg-indigo-600 hover:bg-indigo-500 transition text-white px-3 py-1 rounded text-sm shadow">
                    + Upload
                </a>

                <!-- Dropdown -->
                <div class="relative">
                    <button onclick="toggleDropdown()" 
                        class="flex items-center gap-1 bg-gray-700 px-3 py-1 rounded hover:bg-gray-600 transition">
                        Select
                        <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" 
                                d="M5.23 7.21a.75.75 0 011.06.02L10 10.94l3.71-3.71a.75.75 0 111.06 1.06l-4.24 4.25a.75.75 0 01-1.06 0L5.21 8.27a.75.75 0 01.02-1.06z" 
                                clip-rule="evenodd" />
                        </svg>
                    </button>

                    <div id="dropdownMenu" 
                         class="hidden absolute right-0 mt-2 w-44 bg-gray-800 rounded-md shadow-lg border border-gray-700 overflow-hidden">

                        <a href="{{url_for('profile')}}" class="block px-4 py-2 hover:bg-gray-700 transition">Profile</a>
                        <a href="{{url_for('settings')}}" class="block px-4 py-2 hover:bg-gray-700 transition">Settings</a>

                        <div class="border-t border-gray-700"></div>

                        <a href="/logout" class="block px-4 py-2 hover:bg-gray-700 text-red-400 transition">
                            Logout
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </nav>

    <!-- 📢 Flash Messages -->
    <div class="max-w-4xl mx-auto mt-4 px-6">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                <div class="bg-green-600/20 text-green-400 px-4 py-2 rounded mb-2">
                    {{ msg }}
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <!-- 📦 Content -->
    <main class="flex-1 fade-in px-6 py-4">
        {% block content %}{% endblock %}
    </main>

    <!-- 🔻 Footer -->
    <footer class="text-center py-4 bg-gray-800 text-gray-400 mt-10">
        © 2026 OneTab. Built with Flask
    </footer>

    <!-- JS -->
    <script>
        function handleRename(el, formClass) {
        const form = el.nextElementSibling;
        const input = form.querySelector('input');

        input.value = el.innerText;

        el.style.display = "none";
        form.style.display = "inline";

        input.focus();

        input.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
            e.preventDefault();
            form.submit();
            }
            if (e.key === "Escape") {
            form.style.display = "none";
            el.style.display = "inline";
            }
        });

        input.addEventListener("blur", function() {
            form.submit();
        });
        }

        function editName(el) {
        handleRename(el);
        }

        function editFolderName(el) {
        handleRename(el);
        }
    </script>
    <script>
        function handleRename(el) {
            const form = el.nextElementSibling;

            if (!form) return;

            const input = form.querySelector('input');
            if (!input) return;

            input.value = el.innerText;

            el.style.display = "none";
            form.style.display = "inline";

            input.focus();

            // remove old listeners (important)
            input.onkeydown = null;
            input.onblur = null;

            input.onkeydown = function(e) {
                if (e.key === "Enter") {
                    e.preventDefault();
                    form.submit();
                }
                if (e.key === "Escape") {
                    form.style.display = "none";
                    el.style.display = "inline";
                }
            };

            input.onblur = function() {
                form.submit();
            };
        }

        function editName(el) {
            handleRename(el);
        }

        function editFolderName(el) {
            handleRename(el);
        }
    </script>
    <script>
        function toggleDropdown() {
            const menu = document.getElementById("dropdownMenu");
            menu.classList.toggle("hidden");
        }

        // close when clicking outside
        document.addEventListener("click", function(e) {
            const dropdown = document.getElementById("dropdownMenu");

            if (!e.target.closest(".relative")) {
                dropdown.classList.add("hidden");
            }
        });
    </script>
</body>
</html>
