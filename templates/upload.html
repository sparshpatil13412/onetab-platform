{% block title %}Upload File - OneTab{% endblock %}

{% block content%}
    <h2>Upload File</h2>

    <form action="/upload/{{folder.uuid}}" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button type="submit">Upload</button>
    </form>
{% endblock%}
