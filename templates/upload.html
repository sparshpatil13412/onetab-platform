{% extends "base2.html" %}

{% block title %}Upload File - OneTab{% endblock %}

{% block content%}
    <h2>Upload File</h2>

    <form action="/upload/{{folder.uuid}}" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <button type="submit">
            Upload
        </button>
    </form>
{% endblock%}
